name: Multi Job workflow-needs
on: push
jobs:
  test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: install dependencies
        run: npm install axios
      - name: Run Test
        run: echo Run Test

  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: install dependencies
        run: npm install axios
      - name: Run Deploy
        run: echo Run Deploy
